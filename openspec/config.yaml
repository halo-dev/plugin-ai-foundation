schema: spec-driven

context: |
  Halo CMS plugin providing shared AI foundation capabilities for other plugins.
  Multi-module Gradle: api (published Java SDK), app (plugin impl), ui (Vue 3 console).
  This plugin is unreleased — backward compatibility is not a concern.

  Provider type system:
  - Each provider is a single @Component class implementing AiProviderType, extending AbstractAiProviderType.
  - One class = identity + metadata + behavior. No split between adapter and metadata.
  - Discovered via Spring ApplicationContext.getBeansOfType(). Adding a provider = one new class, no frontend changes.
  - Metadata exposed via REST API. Frontend must not hardcode provider type lists.

  Extension model:
  - AiProvider and AiModel are separate Extensions (GVK: aifoundation.halo.run/v1alpha1).
  - AiModel.spec.providerName references AiProvider.metadata.name (resource name, not providerType).
  - modelRef format: providerResourceName/modelId.

  API key conventions:
  - Stored as Halo Secret references (spec.apiKeySecretName), resolved at runtime by SecretResolver.
  - Single Secret per provider. No multi-key rotation.

  Embedding API:
  - Two-layer: simple calls (embedQuery) + advanced EmbeddingRequest (dimensions, maxBatchSize, providerOptions).
  - Public API must not expose Spring AI types.

  Dev workflow:
  - After backend changes: docker rm halo-for-plugin-development -f && ./gradlew haloServer
  - After API/field changes: ./gradlew generateApiClient — frontend must use generated client, never hardcode paths.

rules:
  proposal:
    - Always include a non-goals section when scope is being reduced.
    - Clearly state when a change is backend-only or UI-only.
  design:
    - Preserve the distinction between providerType and provider resource name.
    - Public embedding API must not expose Spring AI types.
  tasks:
    - Put server-side validation before UI tasks when both exist.
    - When UI is split to another change, remove UI tasks from the backend change instead of leaving placeholders.
