# Refer https://docs.halo.run/developer-guide/plugin/basics/manifest

apiVersion: plugin.halo.run/v1alpha1
kind: Plugin
metadata:
  # The name defines how the plugin is invoked, A unique name
  name: ai-foundation
spec:
  enabled: true
  requires: ">=2.23.0"
  author:
    name: Halo
    website: https://github.com/Halo
  logo: logo.png
  homepage: https://github.com/Halo/ai-foundation#readme
  repo: https://github.com/Halo/ai-foundation
  issues: https://github.com/Halo/ai-foundation/issues
  displayName: "AI 基础设施"
  description: "为 Halo 提供统一的 AI 模型配置能力，并暴露 Java SDK 供其他插件调用 AI 能力"
  license:
    - name: "GPL-3.0"
      url: "https://github.com/Halo/ai-foundation/blob/main/LICENSE"
