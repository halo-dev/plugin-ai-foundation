name: CD

on:
  release:
    types:
      - published

jobs:
  cd:
    if: github.event.release.tag_name != 'nightly'
    uses: halo-sigs/reusable-workflows/.github/workflows/plugin-cd.yaml@v4
    secrets:
      halo-pat: ${{ secrets.HALO_PAT }}
    permissions:
      contents: write
    with:
      ui-path: "ui"
      pnpm-version: 10
      node-version: 24
      java-version: 21
      artifacts-path: "app/build/libs"
      app-id: app-acslk9nu
