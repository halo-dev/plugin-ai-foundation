apiVersion: plugin.halo.run/v1alpha1
kind: Plugin
metadata:
  name: ai-foundation
  annotations:
    # Add supports for Halo App Store
    # https://www.halo.run/store/apps/app-acslk9nu
    "store.halo.run/app-id": "app-acslk9nu"
spec:
  enabled: true
  requires: ">=2.25.0"
  author:
    name: Halo
    website: https://github.com/halo-dev
  logo: icon.png
  configMapName: ai-foundation-configmap
  homepage: https://www.halo.run/store/apps/app-acslk9nu
  repo: https://github.com/halo-dev/plugin-ai-foundation
  issues: https://github.com/halo-dev/plugin-ai-foundation/issues
  displayName: "AI Foundation"
  description: "Halo 官方 AI 能力平台，统一接入主流大模型，为插件生态提供文本生成、嵌入向量、工具调用等智能化能力"
  license:
    - name: "GPL-3.0"
      url: "https://github.com/halo-dev/plugin-ai-foundation/blob/main/LICENSE"
